<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Restoration Workflow</title>
    <script>
      // Applied before first paint so there is no flash of the wrong theme.
      // Kept inline (not a bundled module) for exactly that reason — it must
      // run before the stylesheet's default paints anything.
      (function () {
        try {
          var saved = localStorage.getItem("restoration:theme");
          var theme =
            saved === "light" || saved === "dark" || saved === "high-contrast"
              ? saved
              : window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";
          document.documentElement.dataset.theme = theme;
          var scale = localStorage.getItem("restoration:ui-scale");
          if (scale) document.documentElement.style.setProperty("--ui-scale", scale);
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
