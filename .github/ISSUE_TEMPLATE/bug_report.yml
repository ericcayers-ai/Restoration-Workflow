name: Bug report
description: Something in the engine, API, CLI, or UI isn't working as expected.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Security issues go to [SECURITY.md](https://github.com/ericcayers-ai/Restoration-Workflow/blob/main/SECURITY.md) — do not report them here.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what actually happened?
    validations:
      required: true

  - type: dropdown
    id: how-run
    attributes:
      label: How are you running it?
      options:
        - Windows Setup installer (.exe)
        - macOS DMG (.app)
        - Linux AppImage
        - From source (pip install -e + npm run build / restore serve)
        - CLI only (restore run / analyze / …)
        - Docker
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: From the launcher banner, `restore --version`, or `GET /api/health`.
      placeholder: "0.6.0"
    validations:
      required: true

  - type: textarea
    id: pipeline
    attributes:
      label: Pipeline (if relevant)
      description: >
        Pipeline JSON, Simple Mode “why this pipeline” text, or the model chain
        involved. Paste verbatim when possible.
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: >
        Console from `restore serve` / the Windows terminal window, and/or the
        browser DevTools console for UI issues.
      render: shell

  - type: dropdown
    id: hardware
    attributes:
      label: Hardware
      options:
        - CPU only
        - NVIDIA GPU (CUDA)
        - Apple Silicon (MPS)
        - Not sure
    validations:
      required: true
