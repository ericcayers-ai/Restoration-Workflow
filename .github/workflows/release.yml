name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Build Python package
        working-directory: backend
        run: pip install -e ".[dev]" && pytest -q
      # PyInstaller is not in [dev]; install packaging (+ inference packages that
      # build_exe.py --collect-all's) before bundling the Windows desktop exe.
      - name: Install packaging deps
        working-directory: backend
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[inference,packaging]"
      - name: PyInstaller bundle + zip
        working-directory: backend
        run: python packaging/build_exe.py
      - name: Smoke frozen Windows zip
        working-directory: backend
        run: python packaging/smoke_windows_zip.py
      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: RestorationWorkflow-windows
          path: backend/dist/RestorationWorkflow-windows.zip
          if-no-files-found: error
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: backend/dist/RestorationWorkflow-windows.zip
          generate_release_notes: true
          body: |
            ## Windows portable package

            1. Download **RestorationWorkflow-windows.zip**
            2. Extract the folder anywhere
            3. Double-click **Run.bat**

            The app starts a local server and opens your browser. No Python install required.
            A GPU is optional (CPU works, just slower). Model weights download on first use.

            Advanced: you can also run `RestorationWorkflow.exe` directly from the extracted folder.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Backend tests
        working-directory: backend
        run: pip install -e ".[dev]" && pytest -q
      - name: Packaging / v0.6 import smoke
        working-directory: backend
        run: python packaging/check_bundle_manifest.py

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Backend tests
        working-directory: backend
        run: pip install -e ".[dev]" && pytest -q
      - name: Packaging / v0.6 import smoke
        working-directory: backend
        run: python packaging/check_bundle_manifest.py
      - name: Docker headless image
        run: docker build -t restoration-workflow:${{ github.ref_name }} .
      - name: Docker inference smoke
        run: |
          docker run --rm -d --name rw-smoke -p 8765:8765 restoration-workflow:${{ github.ref_name }}
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8765/api/health | grep -q '"status":"ok"'; then
              curl -fsS http://127.0.0.1:8765/api/health
              docker stop rw-smoke
              exit 0
            fi
            sleep 2
          done
          docker logs rw-smoke || true
          docker stop rw-smoke || true
          exit 1
