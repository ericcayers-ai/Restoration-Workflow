name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Build Python package
        working-directory: backend
        run: pip install -e ".[dev]" && pytest -q
      - name: PyInstaller bundle
        working-directory: backend
        run: python packaging/build_exe.py

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Backend tests
        working-directory: backend
        run: pip install -e ".[dev]" && pytest -q

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Backend tests
        working-directory: backend
        run: pip install -e ".[dev]" && pytest -q
      - name: Docker headless image
        run: docker build -t restoration-workflow:${{ github.ref_name }} .
