name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Base install only — no torch/opencv. The engine, API, CLI and analyzer are
      # designed to work without the [inference] extra (nodes report themselves
      # unrunnable instead of the app failing to start), so this is what most
      # contributors and most of the test suite actually need.
      - name: Install (base + dev)
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: pytest -q

  backend-inference:
    name: backend (inference extra)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # The CPU-only wheel index keeps this fast — the default PyPI torch wheel
      # bundles CUDA runtime libraries that a CI runner never uses.
      - name: Install torch (CPU-only)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install (inference + dev)
        run: pip install -e ".[dev,inference]"

      - name: Test (full suite, including tiling geometry tests)
        run: pytest -q

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Accessibility (axe-core)
        run: npm run a11y
